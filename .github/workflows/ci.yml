name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ "*" ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      JWT_SECRET: ci-test-secret
      JWT_EXPIRY: 1d
      DATABASE_URL: postgresql://auton:dev_password_change_in_production@localhost:5432/auton_dev?schema=public
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start services
        run: docker compose up -d

      - name: Wait for services
        run: |
          echo "Waiting for PostgreSQL..."
          for i in {1..10}; do
            if docker exec auton-postgres pg_isready -U auton; then
              echo "PostgreSQL is ready"
              break
            fi
            sleep 3
          done

          echo "Waiting for Redis..."
          for i in {1..10}; do
            if docker exec auton-redis redis-cli ping | grep -q PONG; then
              echo "Redis is ready"
              break
            fi
            sleep 3
          done

          # Verify both services are ready
          if ! docker exec auton-postgres pg_isready -U auton; then
            echo "PostgreSQL did not become ready in time" >&2
            exit 1
          fi

          if ! docker exec auton-redis redis-cli ping | grep -q PONG; then
            echo "Redis did not become ready in time" >&2
            exit 1
          fi

          echo "All services are ready"

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply database schema
        run: npm run db:push

      - name: Run tests
        run: npm test

      - name: Stop services
        if: always()
        run: docker compose down

